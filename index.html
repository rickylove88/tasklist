<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音声タスクリスト</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f0f4f8; min-height: 100vh; }
header { background: #2c3e50; color: white; padding: 16px 20px; text-align: center; }
header h1 { font-size: 1.1rem; }
.progress-wrap { background: white; padding: 12px 20px; border-bottom: 1px solid #e0e0e0; }
.progress-bar { background: #ddd; border-radius: 10px; height: 8px; margin-bottom: 6px; }
.progress-fill { background: #27ae60; height: 8px; border-radius: 10px; transition: width 0.3s; width: 0%; }
.progress-text { font-size: 0.8rem; color: #666; text-align: center; }
.form-section { padding: 14px; background: white; margin: 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.form-row { display: flex; gap: 8px; margin-bottom: 8px; }
.form-row input, .form-row select { flex: 1; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.88rem; }
.form-row input[type=date] { flex: 0 0 auto; width: 150px; }
.voice-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; background: #2c3e50; color: white; font-size: 0.95rem; cursor: pointer; margin-bottom: 8px; }
.voice-btn.listening { background: #e74c3c; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
.voice-result { padding: 8px 12px; background: #f9f9f9; border-radius: 8px; font-size: 0.85rem; color: #555; margin-bottom: 8px; min-height: 36px; }
.add-btn { width: 100%; padding: 11px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 0.95rem; cursor: pointer; font-weight: bold; }
.filter-row { display: flex; gap: 6px; padding: 0 12px 8px; overflow-x: auto; }
.filter-btn { flex-shrink: 0; padding: 7px 12px; border: 1px solid #ddd; border-radius: 20px; background: white; font-size: 0.78rem; cursor: pointer; color: #555; }
.filter-btn.active { background: #2c3e50; color: white; border-color: #2c3e50; }
.list { padding: 0 12px 80px; }
.item { background: white; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
.item.done { opacity: 0.4; }
.item.done .item-task, .item.done .item-company { text-decoration: line-through; color: #aaa; }
.item.overdue { border-left: 3px solid #e74c3c; }
.item-top { display: flex; align-items: flex-start; gap: 10px; }
input[type=checkbox] { width: 22px; height: 22px; accent-color: #27ae60; cursor: pointer; flex-shrink: 0; margin-top: 2px; }
.item-body { flex: 1; }
.item-company { font-weight: bold; font-size: 0.92rem; color: #222; }
.item-task { font-size: 0.85rem; color: #444; margin-top: 3px; }
.item-meta { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; align-items: center; }
.badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
.badge-bank { background: #e3f2fd; color: #1565c0; }
.badge-legal { background: #f3e5f5; color: #6a1b9a; }
.badge-payment { background: #fce4ec; color: #b71c1c; }
.badge-mercari { background: #fff3e0; color: #e65100; }
.badge-other { background: #f5f5f5; color: #555; }
.badge-urgent { background: #ffebee; color: #c62828; }
.item-date { font-size: 0.75rem; color: #888; }
.item-date.overdue { color: #e74c3c; font-weight: bold; }
.item-del { background: none; border: none; color: #ccc; font-size: 1.2rem; cursor: pointer; padding: 0 4px; }
.empty { text-align: center; color: #aaa; font-size: 0.9rem; padding: 40px 0; }
</style>
</head>
<body>
<header><h1>📋 音声タスクリスト</h1></header>
<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="pf"></div></div>
  <div class="progress-text" id="pt">0 / 0 完了</div>
</div>
<div class="form-section">
  <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()">🎤 タップして音声入力</button>
  <div class="voice-result" id="voiceResult">ここに音声が表示されます</div>
  <div class="form-row">
    <input type="text" id="companyInput" placeholder="会社名">
  </div>
  <div class="form-row">
    <input type="text" id="taskInput" placeholder="タスク内容" onkeydown="if(event.key==='Enter')addItem()">
  </div>
  <div class="form-row">
    <select id="categoryInput">
      <option value="other">カテゴリ</option>
      <option value="bank">🏦 銀行</option>
      <option value="legal">⚖️ 法務</option>
      <option value="payment">💳 支払い</option>
      <option value="mercari">📦 メルカリ</option>
    </select>
    <input type="date" id="dateInput">
  </div>
  <button class="add-btn" onclick="addItem()">＋ 追加</button>
</div>
<div class="filter-row">
  <button class="filter-btn active" onclick="setFilter('all',this)">すべて</button>
  <button class="filter-btn" onclick="setFilter('urgent',this)">⚡急ぎ</button>
  <button class="filter-btn" onclick="setFilter('overdue',this)">⏰期限切れ</button>
  <button class="filter-btn" onclick="setFilter('bank',this)">🏦銀行</button>
  <button class="filter-btn" onclick="setFilter('legal',this)">⚖️法務</button>
  <button class="filter-btn" onclick="setFilter('payment',this)">💳支払い</button>
  <button class="filter-btn" onclick="setFilter('mercari',this)">📦メルカリ</button>
  <button class="filter-btn" onclick="setFilter('active',this)">未完了</button>
  <button class="filter-btn" onclick="setFilter('done',this)">完了済み</button>
</div>
<div class="list" id="list"></div>
<script>
let tasks = JSON.parse(localStorage.getItem('tasks2') || '[]');
let filter = 'all';
let recognition = null;
let listening = false;

function save() { localStorage.setItem('tasks2', JSON.stringify(tasks)); }

function isOverdue(dateStr) {
  if (!dateStr) return false;
  return new Date(dateStr) < new Date(new Date().toDateString());
}

function addItem() {
  const company = document.getElementById('companyInput').value.trim();
  const task = document.getElementById('taskInput').value.trim();
  const category = document.getElementById('categoryInput').value;
  const date = document.getElementById('dateInput').value;
  if (!task) return;
  const urgent = task.includes('急ぎ') || task.includes('急いで') || task.includes('すぐ');
  tasks.push({ id: Date.now(), company, task, category, date, done: false, urgent });
  document.getElementById('companyInput').value = '';
  document.getElementById('taskInput').value = '';
  document.getElementById('categoryInput').value = 'other';
  document.getElementById('dateInput').value = '';
  save(); render();
}

function toggleDone(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; save(); render(); }
}

function deleteItem(id) {
  if (!confirm('削除しますか？')) return;
  tasks = tasks.filter(t => t.id !== id);
  save(); render();
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

const catClass = { bank:'badge-bank', legal:'badge-legal', payment:'badge-payment', mercari:'badge-mercari', other:'badge-other' };
const catLabel = { bank:'🏦 銀行', legal:'⚖️ 法務', payment:'💳 支払い', mercari:'📦 メルカリ', other:'' };

function render() {
  const today = new Date().toDateString();
  let filtered = tasks;
  if (filter === 'urgent') filtered = tasks.filter(t => t.urgent && !t.done);
  else if (filter === 'overdue') filtered = tasks.filter(t => isOverdue(t.date) && !t.done);
  else if (filter === 'active') filtered = tasks.filter(t => !t.done);
  else if (filter === 'done') filtered = tasks.filter(t => t.done);
  else if (['bank','legal','payment','mercari'].includes(filter)) filtered = tasks.filter(t => t.category === filter && !t.done);

  const list = document.getElementById('list');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">タスクがありません</div>';
  } else {
    list.innerHTML = filtered.map(t => {
      const overdue = isOverdue(t.date) && !t.done;
      return `<div class="item ${t.done?'done':''} ${overdue?'overdue':''}">
        <div class="item-top">
          <input type="checkbox" ${t.done?'checked':''} onchange="toggleDone(${t.id})">
          <div class="item-body">
            ${t.company ? `<div class="item-company">🏢 ${t.company}</div>` : ''}
            <div class="item-task">${t.task}${t.urgent&&!t.done?' <span class="badge badge-urgent">⚡急ぎ</span>':''}</div>
            <div class="item-meta">
              ${t.category && t.category !== 'other' ? `<span class="badge ${catClass[t.category]}">${catLabel[t.category]}</span>` : ''}
              ${t.date ? `<span class="item-date ${overdue?'overdue':''}">${overdue?'⏰ 期限切れ: ':'📅 '}${t.date}</span>` : ''}
            </div>
          </div>
          <button class="item-del" onclick="deleteItem(${t.id})">×</button>
        </div>
      </div>`;
    }).join('');
  }
  const done = tasks.filter(t => t.done).length;
  const total = tasks.length;
  document.getElementById('pf').style.width = total ? (done/total*100)+'%' : '0%';
  document.getElementById('pt').textContent = `${done} / ${total} 完了`;
}

function toggleVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('ChromeまたはSafariをお使いください。');
    return;
  }
  if (listening) { recognition.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.interimResults = true;
  recognition.onstart = () => {
    listening = true;
    document.getElementById('voiceBtn').classList.add('listening');
    document.getElementById('voiceBtn').textContent = '🔴 聞いています... (タップで停止)';
    document.getElementById('voiceResult').textContent = '話してください...';
  };
  recognition.onresult = (e) => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    document.getElementById('voiceResult').textContent = transcript;
    document.getElementById('taskInput').value = transcript;
  };
  recognition.onend = () => {
    listening = false;
    document.getElementById('voiceBtn').classList.remove('listening');
    document.getElementById('voiceBtn').textContent = '🎤 タップして音声入力';
  };
  recognition.onerror = () => {
    listening = false;
    document.getElementById('voiceBtn').classList.remove('listening');
    document.getElementById('voiceBtn').textContent = '🎤 タップして音声入力';
  };
  recognition.start();
}
render();
</script>
</body>
</html>
